server:
  port: 8082

spring:
  application:
    name: catalog-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:catalog_db}
    username: ${DB_USER:catalog_user}
    password: ${DB_PASSWORD:catalogpass}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info


app:
  jwt:
    secret: ${JWT_SECRET:d498ad819605256a32607bf42d199fb70ec9cb8dc2cf97500858ce8672818b15}
